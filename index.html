<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cricdb — cricket stats explorer</title>
<link rel="preload" href="/vendor/fonts/bricolage-grotesque-variable.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="/vendor/fonts/inter-variable.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="/styles.css" />
<script src="/vendor/chartjs/chart.umd.min.js" defer></script>
</head>
<body>
  <div id="filter-drawer-host"></div>
  <div id="player-popup-host"></div>
  <div class="app">
    <header class="app-header">
      <div class="app-header__brand">
        <h1 class="app-header__title"><span class="app-header__wordmark">cricdb</span></h1>
        <p class="app-header__scope" id="scope-sentence" aria-live="polite"></p>
      </div>
      <div class="app-header__controls">
        <div class="segmented" data-role="view" role="group" aria-label="View">
          <button type="button" class="segmented__btn is-active" data-value="table">Stats</button>
          <button type="button" class="segmented__btn" data-value="graph">Graphs</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div id="init-status" class="init-status" role="status" aria-live="polite"></div>

      <div id="app-content" class="app-content" hidden>
        <section class="filter-section" aria-label="Filters">
          <!-- Discipline (decision 44b): static markup so main.js's module-level
               `document.querySelector('[data-role="discipline"]')` (bound before
               src/filters.js ever renders) finds a real element immediately.
               src/filters.js relocates this node into its visual slot (second,
               right after Gender) once it renders #filter-bar — see the
               relocation comment in mountFilters(). -->
          <div class="filter-group filter-group--discipline">
            <span class="filter-label">Discipline</span>
            <div class="segmented" data-role="discipline" role="group" aria-label="Discipline">
              <button type="button" class="segmented__btn is-active" data-value="batting">Batting</button>
              <button type="button" class="segmented__btn" data-value="bowling">Bowling</button>
            </div>
          </div>
          <div class="filter-bar" id="filter-bar"></div>
        </section>

        <section class="pills-section" id="pills-bar" aria-label="Applied filters"></section>

        <div class="player-search" id="player-search-section">
          <input type="text" id="player-search-input" class="input" placeholder="Search players…" aria-label="Search players" />
        </div>

        <section class="table-section" id="table-area" aria-label="Player stats table"></section>

        <section class="graph-section" id="graph-area" aria-label="Graphs" hidden></section>
      </div>
    </main>

    <footer class="app-footer">
      <span id="footer-data-date"></span>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
