<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cricdb — cricket stats explorer</title>
<link rel="preload" href="/vendor/fonts/bricolage-grotesque-variable.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="/vendor/fonts/inter-variable.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="/styles.css" />
<script src="/vendor/chartjs/chart.umd.min.js" defer></script>
</head>
<body>
  <div id="player-popup-host"></div>

  <!-- Filters popup (F1a): the single home for EVERY filter (replaces the old
       on-page scope strip + right-side drawer). Static shell so main.js's
       module-level lookups for the discipline toggle and #filter-bar resolve at
       load time; opened via openFiltersPopup(), closed via ×/backdrop/Escape.
       Closing NEVER runs a query — only the footer "Search" button does. Three
       collapsible sections: Conditions, Player, Advanced Filters. -->
  <div class="filters-popup" id="filters-popup" data-role="filters-popup" hidden>
    <div class="filters-popup__backdrop" data-role="fpop-backdrop"></div>
    <div class="filters-popup__panel" role="dialog" aria-modal="true" aria-label="Filters" tabindex="-1" data-role="fpop-panel">
      <div class="filters-popup__header">
        <h2 class="filters-popup__title">Filters</h2>
        <button type="button" class="filters-popup__close" data-role="fpop-close" aria-label="Close">&times;</button>
      </div>

      <div class="filters-popup__body">
        <!-- Section 1: Conditions (was the scope strip) — holds the static
             Discipline toggle (main.js binds it at module load) and #filter-bar,
             which src/filters.js populates + relocates Discipline into. -->
        <section class="filters-popup__section">
          <button type="button" class="filters-popup__section-header" data-role="fpop-section-toggle" aria-expanded="true" aria-controls="fpop-body-conditions">
            <span class="filters-popup__section-name">Conditions</span>
            <span class="filters-popup__chevron" aria-hidden="true">▾</span>
          </button>
          <div class="filters-popup__section-body" id="fpop-body-conditions">
            <div class="filter-group filter-group--discipline">
              <span class="filter-label">Discipline</span>
              <div class="segmented" data-role="discipline" role="group" aria-label="Discipline">
                <button type="button" class="segmented__btn is-active" data-value="batting">Batting</button>
                <button type="button" class="segmented__btn" data-value="bowling">Bowling</button>
              </div>
            </div>
            <div class="filter-bar" id="filter-bar"></div>
          </div>
        </section>

        <!-- Section 2: Player (was the drawer's Team + Player profile) — mounted
             by src/drawer.js's mountFilterDrawer into #popup-player-host. -->
        <section class="filters-popup__section">
          <button type="button" class="filters-popup__section-header" data-role="fpop-section-toggle" aria-expanded="true" aria-controls="fpop-body-player">
            <span class="filters-popup__section-name">Player</span>
            <span class="filters-popup__chevron" aria-hidden="true">▾</span>
          </button>
          <div class="filters-popup__section-body" id="fpop-body-player">
            <div id="popup-player-host"></div>
          </div>
        </section>

        <!-- Section 3: Advanced Filters (was the drawer's Advanced — opposition +
             stat conditions) — mounted into #popup-advanced-host. -->
        <section class="filters-popup__section">
          <button type="button" class="filters-popup__section-header" data-role="fpop-section-toggle" aria-expanded="true" aria-controls="fpop-body-advanced">
            <span class="filters-popup__section-name">Advanced Filters</span>
            <span class="filters-popup__chevron" aria-hidden="true">▾</span>
          </button>
          <div class="filters-popup__section-body" id="fpop-body-advanced">
            <div id="popup-advanced-host"></div>
          </div>
        </section>
      </div>

      <div class="filters-popup__footer">
        <button type="button" class="btn btn--primary" data-role="fpop-search">Search</button>
      </div>
    </div>
  </div>

  <div class="app">
    <header class="app-header">
      <div class="app-header__brand">
        <h1 class="app-header__title"><span class="app-header__wordmark">cricdb</span></h1>
        <p class="app-header__scope" id="scope-sentence" aria-live="polite"></p>
      </div>
      <div class="app-header__controls">
        <!-- Header search (task 3a, owner decision 46): a compact player
             search visible on BOTH Stats and Graphs (this element is never
             toggled hidden by the view switch) — the same omnisearch
             component as the table-search box below, mounted separately in
             main.js so picking a player here always opens their popup. -->
        <div class="header-search" id="header-search-section">
          <svg class="header-search__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
          </svg>
          <input
            type="text"
            id="header-search-input"
            class="input header-search__input"
            placeholder="Search players…"
            aria-label="Search players"
            autocomplete="off"
            role="combobox"
            aria-expanded="false"
            aria-controls="header-search-results"
            aria-autocomplete="list"
          />
          <div
            class="omnisearch__results"
            id="header-search-results"
            role="listbox"
            aria-label="Player search results"
            hidden
          ></div>
        </div>
        <div class="segmented" data-role="view" role="group" aria-label="View">
          <button type="button" class="segmented__btn is-active" data-value="table">Stats</button>
          <button type="button" class="segmented__btn" data-value="graph">Graphs</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div id="init-status" class="init-status" role="status" aria-live="polite"></div>

      <div id="app-content" class="app-content" hidden>
        <!-- Scope strip removed (F1a) — all filters now live in the Filters
             popup above. The Discipline toggle + #filter-bar moved into that
             popup's Conditions section; the subtitle (#scope-sentence) is the
             only always-visible scope indicator. -->
        <section class="pills-section" id="pills-bar" aria-label="Applied filters"></section>

        <div class="player-search" id="player-search-section">
          <input
            type="text"
            id="player-search-input"
            class="input"
            placeholder="Search players…"
            aria-label="Search players"
            autocomplete="off"
            role="combobox"
            aria-expanded="false"
            aria-controls="player-search-results"
            aria-autocomplete="list"
          />
          <div
            class="omnisearch__results"
            id="player-search-results"
            role="listbox"
            aria-label="Player search results"
            hidden
          ></div>
        </div>

        <section class="table-section" id="table-area" aria-label="Player stats table"></section>

        <section class="graph-section" id="graph-area" aria-label="Graphs" hidden></section>
      </div>
    </main>

    <footer class="app-footer">
      <span id="footer-data-date"></span>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
