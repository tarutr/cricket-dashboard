name: Data pipeline

on:
  schedule:
    - cron: '47 3,9,15,21 * * *'
  workflow_dispatch:

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Download cricket.duckdb from R2
        run: python pipeline/download_db.py
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}

      - name: Ingest new Cricsheet data
        run: python pipeline/ingest.py

      # D2: fetch profiles sheet from Dropbox (added from Phase D2 onward)
      # D2: rebuild player_profiles table inside cricket.duckdb (added from Phase D2 onward)

      - name: Upload cricket.duckdb to R2
        if: vars.DB_UPLOAD_ENABLED == 'true'
        run: python pipeline/upload_db.py
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      - name: DB upload skipped
        if: vars.DB_UPLOAD_ENABLED != 'true'
        run: echo "DB upload SKIPPED — repository variable DB_UPLOAD_ENABLED is not 'true' (old pipeline still owns cricket.duckdb)"

      - name: Export parquet + manifest
        run: python export_parquet.py --db data/cricket.duckdb --out /tmp/export --upload
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
