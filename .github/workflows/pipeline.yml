name: Data pipeline

on:
  schedule:
    - cron: '47 3,9,15,21 * * *'
  workflow_dispatch:

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt

      - name: Download cricket.duckdb from R2
        run: python pipeline/download_db.py
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}

      - name: Ingest new Cricsheet data
        run: python pipeline/ingest.py

      - name: Check ingest health
        run: python pipeline/check_ingest.py
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Fetch profiles sheet from Dropbox
        run: >
          python pipeline/sheet_fetch.py
          --name profiles
          --url-env DROPBOX_PROFILES_URL
          --out data/profiles.csv
          --expect-header player_id
          --seed source_data/cricinfo_player_profiles.csv
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          DROPBOX_PROFILES_URL: ${{ secrets.DROPBOX_PROFILES_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          STALE_DAYS: ${{ vars.STALE_DAYS || '21' }}

      - name: Rebuild player_profiles
        run: python pipeline/build_profiles.py --db data/cricket.duckdb --csv data/profiles.csv

      - name: Report new unmatched active players
        run: python pipeline/report_new_unmatched.py --db data/cricket.duckdb
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Queue new players for review
        run: python pipeline/queue_new_for_review.py --db data/cricket.duckdb --profiles-csv data/profiles.csv
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Commit queued players for review
        run: |
          if git diff --quiet -- review/new_players_for_review.csv; then
            echo "No new rows in review/new_players_for_review.csv — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add review/new_players_for_review.csv
          git commit -m "Queue new unmatched players for review" || { echo "Nothing to commit after add"; exit 0; }
          push_ok=""
          for attempt in 1 2; do
            git pull --rebase origin main || echo "::warning::git pull --rebase failed (attempt $attempt)"
            if git push origin HEAD:main; then
              push_ok="yes"
              break
            fi
            echo "::warning::git push rejected (attempt $attempt) — retrying"
          done
          if [ -z "$push_ok" ]; then
            echo "::warning::Could not push review/new_players_for_review.csv after retries — will retry next run"
          fi

      - name: Upload cricket.duckdb to R2
        if: vars.DB_UPLOAD_ENABLED == 'true'
        run: python pipeline/upload_db.py
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      - name: DB upload skipped
        if: vars.DB_UPLOAD_ENABLED != 'true'
        run: echo "DB upload SKIPPED — repository variable DB_UPLOAD_ENABLED is not 'true' (old pipeline still owns cricket.duckdb)"

      - name: Export parquet + manifest
        run: python export_parquet.py --db data/cricket.duckdb --out /tmp/export --upload
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}

      - name: Fail run if profiles fetch fell back
        run: |
          if [ -f data/profiles_fetch_failed ]; then
            echo "::error::Profiles fetch failed — run used last-good copy (site is fine; fix the Dropbox link)"
            exit 1
          fi
          echo "Profiles fetch OK — no fallback marker present."

      - name: Alert owner on pipeline failure
        if: failure()
        continue-on-error: true
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'pipeline')
          import alerts
          run_url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          alerts.send_alert(
              'Data pipeline run FAILED',
              f'Data pipeline run FAILED at {run_url} — the site has stopped '
              f'refreshing; check the Actions log',
          )
          "
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
